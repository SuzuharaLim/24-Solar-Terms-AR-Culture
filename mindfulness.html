<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正念 | 歲時</title>
    <style>
        :root {
            --apple-black: #000000;
            --apple-white: #F5F5F7;
            --apple-gray: #86868B;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--apple-black);
            color: var(--apple-white);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 頂部導覽列：極簡返回按鈕 */
        .nav-bar {
            padding: 20px 24px;
            display: flex;
            justify-content: flex-start;
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 100;
        }
        .back-btn {
            color: var(--apple-gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        .back-btn:active { color: var(--apple-white); }

        /* 中央呼吸光暈 (類似 Siri 啟動) */
        .orb-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            filter: blur(20px);
            animation: breathe 6s infinite ease-in-out;
            transition: all 1s ease;
        }

        /* 根據不同的對話狀態改變光暈 */
        .orb.state-listen { transform: scale(1.2); opacity: 0.6; }
        .orb.state-think { transform: scale(0.8); opacity: 0.3; animation: pulse-fast 2s infinite ease-in-out; }
        .orb.state-speak { transform: scale(1.1); opacity: 0.8; background: radial-gradient(circle, rgba(212, 175, 55, 0.6) 0%, rgba(255,255,255,0) 70%); }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
        @keyframes pulse-fast {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(0.95); opacity: 0.6; }
        }

        /* 文字呈現區：霧氣浮現 */
        .message-area {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .message-text {
            font-size: 1.25rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 0.05em;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .message-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 底部毛玻璃按鈕區 */
        .controls {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 20;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--apple-white);
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex: 1;
            max-width: 140px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* 水波紋特效 (Ripple) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
    </div>

    <div class="orb-container">
        <div class="orb" id="center-orb"></div>
    </div>

    <div class="message-area">
        <div class="message-text" id="dialogue-text">請靜下心來。<br>你現在感受到了什麼？</div>
    </div>

    <div class="controls">
        <button class="action-btn" onclick="triggerResponse('今日感受', event)">今日感受</button>
        <button class="action-btn" onclick="triggerResponse('尋求解答', event)">尋求解答</button>
        <button class="action-btn" onclick="triggerResponse('需要平靜', event)">需要平靜</button>
    </div>

    <script>
        const orb = document.getElementById('center-orb');
        const dialogueText = document.getElementById('dialogue-text');

        // 頁面載入時讓初始文字浮現
        window.onload = () => {
            setTimeout(() => {
                dialogueText.classList.add('show');
            }, 500);
        };

        // 水波紋特效函數
        function createRipple(event, button) {
            const circle = document.createElement('span');
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            const rect = button.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.style.classList.add('ripple');

            // 移除舊的波紋
            const ripple = button.querySelector('.ripple');
            if (ripple) { ripple.remove(); }

            button.appendChild(circle);
        }

        // 對話劇本 (可替換為串接 ChatGPT API)
        const responses = {
            '今日感受': "節氣流轉，萬物有時。<br>允許自己接納今天的所有情緒。",
            '尋求解答': "答案往往不在外頭。<br>深呼吸，傾聽你內心的微小聲音。",
            '需要平靜': "閉上雙眼，想像自己是一池春水。<br>風過無痕，心隨之沉靜。"
        };

        function triggerResponse(type, event) {
            // 1. 觸發按鈕水波紋
            createRipple(event, event.currentTarget);

            // 2. 光暈進入「思考」狀態，文字淡出
            orb.className = 'orb state-think';
            dialogueText.classList.remove('show');

            // 3. 延遲後給予回覆 (模擬真實對話感)
            setTimeout(() => {
                // 光暈進入「說話」狀態
                orb.className = 'orb state-speak';
                dialogueText.innerHTML = responses[type];
                dialogueText.classList.add('show');

                // 4. 一段時間後恢復平靜呼吸
                setTimeout(() => {
                    orb.className = 'orb';
                }, 3000);

            }, 1200); // 1.2秒的沉澱時間
        }
    </script>
</body>
</html>
